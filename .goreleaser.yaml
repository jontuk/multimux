version: 2
project_name: multimux

before:
  hooks:
    - sh -c "cd web && pnpm install --frozen-lockfile && pnpm build"

builds:
  - id: multimux
    main: .
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "multimux_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  draft: false
